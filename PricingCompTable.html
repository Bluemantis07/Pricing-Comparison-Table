<!Doctype html>
<html lang="en">
    <head>
        <!--Meta tags-->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial scale=1.0">

        <!--Seo tags-->
        <title>Pricing Comparison Table</title>
        <meta name="description" content="HTML website with comparison table for pricing.">
        <meta name="author" content="Aishwarya Malik | Blue Praying Mantis">

        <!--OG tags-->
        <meta property="og:title" content="Pricing Comparison Table">
        <meta property="og:description" content="Html website with tables for comparing prices">

        <!--Favicon-->
        <link rel="icon" type="image/x-icon" href="images/favicon.ico">
        </head>

        <body>
            <header>
                <h2>ACME Plans</h2>
                </header>
                <section>
        <!--Navigation bar-->
        <nav>
        <ul>
        <li><a href="#"> Homepage </a>
        </li>
        <li><a href="#"> About </a>
        </li>
        <li><a href="#"> Contact </a>
        </li>
        </ul>
        </nav>
        </section>
        <main>
            <!--Table name-->
            <h3>Plan Comparison</h3>
            <table>
                <!--Caption-->
                <caption>
                    Merits and demerits  of different ACME Plans
                </caption>
                <!--table head contaning header scope for columns-->
                <thead>
                    <th scope="col">Plan</th>
                    <th scope="col">Storage </th>
                    <th scope="col">Projects </th>
                    <th scope="col">Support </th>
                    </thead>
                    <!--table body containing header scope of rows and data cells-->
                   <tbody>
                <tr>
                    <th scope="row">Free</th>
                    <td>5G</td>
                    <td>3</td>
                    <td>Email</td>
                    </tr>
                <tr>
                    <th scope="row">Pro</th>
                    <td>100 GB</td>
                    <td>25</td>
                    <td>Priority Email</td>
                    </tr>
                    <tr>
                    <th scope="row">Business</th>
                    <td>1 TB</td>
                    <td>Unlimited</td>
                    <td>24/7 Phone</td>
                    </tr>
                    <!--colspan cell-->
                    <tfoot>
                    <tr>
                    <td colspan ="3">All plans include SSL and daily backups</td>
                    </tr>
                    </tfoot>
                    </tbody>
                </table>
            </main>
               <footer>
                <p>&copy; All rights reserved by ACME 2026</p>
                </footer>
            </body>
            </html>
